<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Helper Test — Daily Math for Kids</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px; line-height: 1.5; }
    h1 { font-size: 1.5rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #e2e8f0; font-size: .9rem; }
    th { background: #f1f5f9; }
    .pass { color: #16a34a; font-weight: 600; }
    .fail { color: #dc2626; font-weight: 600; }
    .topic { font-family: monospace; background: #ede9fe; padding: 2px 6px; border-radius: 4px; }
    .summary { margin-top: 16px; padding: 12px 16px; border-radius: 8px; background: #f8fafc; }
    .legend { margin-top: 8px; font-size: .85rem; color: #64748b; }
    button { padding: 8px 16px; border: none; border-radius: 6px; background: #6366f1; color: #fff; font-weight: 600; cursor: pointer; }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <h1>Math Helper Topic Detector Test</h1>
  <p>This page tests whether the Math Helper correctly identifies the topic for many real question examples.</p>
  <button onclick="runTests()">Run Tests</button>
  <div id="summary" class="summary" style="display:none"></div>
  <table>
    <thead>
      <tr><th>#</th><th>Question</th><th>Expected</th><th>Detected</th><th>Result</th></tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
  <p class="legend">Add more test cases below the <code>testCases</code> array in this file to cover new question types.</p>

  <script src="scripts/math-helper.js"></script>
  <script>
    const testCases = [
      // Volume
      { q: "A box is 5 cm long, 3 cm wide, and 2 cm high. How much can it hold?", expected: "volume" },
      { q: "Find the volume of a cube with side length 4 cm.", expected: "volume" },
      { q: "A tank can hold 50 liters of water. How many milliliters is that?", expected: "volume" },
      { q: "What is the capacity of a container that measures 10 cm by 6 cm by 4 cm?", expected: "volume" },
      { q: "A cuboid has length 8, width 3, and height 2. Find its volume.", expected: "volume" },
      { q: "How many cups will fill a gallon jug?", expected: "volume" },

      // Mass
      { q: "A bag of apples weighs 2 kg. How many grams is that?", expected: "mass" },
      { q: "Which is heavier, 500 g or 1 kg?", expected: "mass" },
      { q: "A puppy weighs 4 pounds. Convert to ounces.", expected: "mass" },
      { q: "Find the mass of an object that weighs 250 g.", expected: "mass" },
      { q: "The box is lighter than the crate. What is the difference in weight?", expected: "mass" },

      // Geometry
      { q: "Find the area of a rectangle with length 7 and width 4.", expected: "geometry" },
      { q: "What is the perimeter of a square with side 9?", expected: "geometry" },
      { q: "A triangle has a base of 6 and height of 3. Find its area.", expected: "geometry" },
      { q: "Calculate the circumference of a circle with radius 5.", expected: "geometry" },
      { q: "A polygon has 5 sides. What is it called?", expected: "geometry" },

      // Fractions
      { q: "What is 3/4 of 12?", expected: "fractions" },
      { q: "Shade half of the circle.", expected: "fractions" },
      { q: "A pizza is cut into 8 slices. If you eat 3, what fraction did you eat?", expected: "fractions" },
      { q: "What is the numerator of 5/6?", expected: "fractions" },

      // Percentage
      { q: "What is 20% of 80?", expected: "percentage" },
      { q: "A shirt costs $40 and is 25% off. What is the discount?", expected: "percentage" },
      { q: "Find the percentage of students who chose red.", expected: "percentage" },

      // Multiplication
      { q: "There are 4 boxes with 6 crayons each. How many crayons in total?", expected: "multiplication" },
      { q: "3 times 7 equals what?", expected: "multiplication" },
      { q: "A garden has 5 rows of 8 plants. How many plants?", expected: "multiplication" },
      { q: "Find the product of 6 and 9.", expected: "multiplication" },

      // Division
      { q: "Share 24 cookies equally among 6 friends.", expected: "division" },
      { q: "What is 56 divided by 8?", expected: "division" },
      { q: "A teacher splits 30 students into groups of 5. How many groups?", expected: "division" },
      { q: "Find the quotient of 45 and 9.", expected: "division" },

      // Subtraction
      { q: "There are 15 birds on a tree. 6 fly away. How many are left?", expected: "subtraction" },
      { q: "What is the difference between 83 and 57?", expected: "subtraction" },
      { q: "You had 50 stickers and gave away 18. How many remain?", expected: "subtraction" },
      { q: "How many more apples does Sam have than Jill?", expected: "subtraction" },

      // Addition
      { q: "Mia has 12 marbles and gets 8 more. How many in total?", expected: "addition" },
      { q: "Find the sum of 45 and 37.", expected: "addition" },
      { q: "There are 5 red balls and 7 blue balls. How many altogether?", expected: "addition" },

      // Patterns
      { q: "What comes next in the pattern: 2, 5, 8, 11, ...?", expected: "patterns" },
      { q: "Find the rule for the sequence 4, 8, 12, 16.", expected: "patterns" },

      // Time
      { q: "A movie starts at 2:30 PM and ends at 4:15 PM. How long is it?", expected: "time" },
      { q: "What time is it 45 minutes after 9:10?", expected: "time" },
      { q: "The bus leaves at 8:00 AM and arrives at 10:30 AM. How long is the trip?", expected: "time" },

      // Money
      { q: "A toy costs $12.50. You pay with $20. How much change?", expected: "money" },
      { q: "What is the total cost of 3 notebooks at $2 each?", expected: "money" },
      { q: "You have 3 loonies and 2 toonies. How much money?", expected: "money" },

      // Algebra
      { q: "Solve for x: x + 5 = 12.", expected: "algebra" },
      { q: "If 3y = 18, what is y?", expected: "algebra" },
      { q: "Find the value of the expression 2a + 3 when a = 4.", expected: "algebra" },

      // Statistics
      { q: "Find the mean of 4, 7, 9, 12.", expected: "statistics" },
      { q: "What is the median of these scores?", expected: "statistics" },
      { q: "What is the probability of rolling a 3 on a die?", expected: "statistics" },

      // General / vague
      { q: "What is the next number in this list?", expected: "general" },
      { q: "Explain your answer.", expected: "general" },

      // Tricky: subtraction words inside a volume problem should NOT become subtraction
      { q: "A tank holds 100 liters. 30 liters are removed. How much is left?", expected: "volume" },
      { q: "A box has 12 cubes. 5 are taken out. How many remain?", expected: "volume" },
    ];

    function runTests() {
      const tbody = document.getElementById('results');
      const summary = document.getElementById('summary');
      tbody.innerHTML = '';
      let pass = 0, fail = 0;
      testCases.forEach((tc, i) => {
        const detected = window.__mh_detectTopic(tc.q);
        const ok = detected === tc.expected;
        if (ok) pass++; else fail++;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${tc.q}</td>
          <td class="topic">${tc.expected}</td>
          <td class="topic">${detected}</td>
          <td class="${ok ? 'pass' : 'fail'}">${ok ? '✓ PASS' : '✗ FAIL'}</td>
        `;
        tbody.appendChild(tr);
      });
      summary.style.display = 'block';
      summary.innerHTML = `
        <strong>Results:</strong> ${pass} passed, ${fail} failed out of ${testCases.length}
        ${fail === 0 ? ' All good!' : ''}
      `;
      summary.style.background = fail === 0 ? '#d1fae5' : '#fee2e2';
    }
  </script>
</body>
</html>
